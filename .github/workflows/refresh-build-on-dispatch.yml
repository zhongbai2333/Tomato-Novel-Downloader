          $out = "TomatoNovelDownloader-WinArm64-${{ env.BUILD_TAG }}.exe"
          Copy-Item -Path target\release\tomato-novel-downloader.exe -Destination (Join-Path dist $out) -Force

      - name: Upload Windows ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-build
          path: dist

  build-macos:
    name: 构建 macOS (arm64) 可执行文件
    needs: fetch_and_clean
    runs-on: macos-latest
    env:
      BUILD_TAG: ${{ needs.fetch_and_clean.outputs.tag }}
