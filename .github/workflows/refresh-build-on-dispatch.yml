      - name: Build release binary (android arm32)
        run: cargo build --release --target armv7-linux-androideabi --no-default-features --features official-api,tts-native,clipboard

      - name: Bundle artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          out="TomatoNovelDownloader-Android_arm32-${BUILD_TAG}"
          cp target/armv7-linux-androideabi/release/tomato-novel-downloader "dist/${out}"

      - name: Upload Android arm32 Artifact
