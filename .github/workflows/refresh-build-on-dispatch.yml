            ~/.cargo/registry
            ~/.cargo/git
            target
            Tomato-Novel-Official-API/target
          key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Bundle artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $out = "TomatoNovelDownloader-Win64-${{ env.BUILD_TAG }}.exe"
          Copy-Item -Path target\release\tomato-novel-downloader.exe -Destination (Join-Path dist $out) -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist

  build-windows-arm64:
