      - name: Link Official-API for path dependency
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API" || true
          ln -s "$GITHUB_WORKSPACE/Tomato-Novel-Official-API" "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"

      - name: Compute Cargo.lock hash
        id: cargo-lock-hash
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f Cargo.lock ]; then
            echo "hash=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          else
            PYTHON=python
          fi
          HASH=$($PYTHON -c "import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            Tomato-Novel-Official-API/target
          key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Bundle artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          out="TomatoNovelDownloader-macOS_arm64-${BUILD_TAG}"
          cp target/release/tomato-novel-downloader "dist/${out}"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist

  build-macos-amd64:
    name: 构建 macOS (amd64) 可执行文件
    needs: fetch_and_clean
    runs-on: macos-latest
    env:
      BUILD_TAG: ${{ needs.fetch_and_clean.outputs.tag }}
    steps:
      - name: Checkout 代码 (按最新 Tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_TAG }}

      - name: Checkout Tomato-Novel-Official-API (private)
        uses: actions/checkout@v4
        with:
          repository: zhongbai2333/Tomato-Novel-Official-API
          token: ${{ secrets.OAPI }}
          path: Tomato-Novel-Official-API

      - name: Link Official-API for path dependency
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API" || true
          ln -s "$GITHUB_WORKSPACE/Tomato-Novel-Official-API" "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"

      - name: Compute Cargo.lock hash
        id: cargo-lock-hash
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f Cargo.lock ]; then
            echo "hash=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          else
            PYTHON=python
          fi
          HASH=$($PYTHON -c "import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Install Rust (x86_64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            Tomato-Novel-Official-API/target
          key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}-amd64
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Bundle artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          out="TomatoNovelDownloader-macOS_amd64-${BUILD_TAG}"
          cp target/x86_64-apple-darwin/release/tomato-novel-downloader "dist/${out}"

      - name: Upload macOS amd64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-amd64-build
          path: dist

  upload_assets:
    name: 上传构建产物到 Release
    needs:
      - fetch_and_clean
      - build-linux
      - build-linux-musl
      - build-linux-musl-arm64
      - build-linux-arm64
      - build-android-arm64
      - build-android-arm32
      - build-windows
      - build-windows-arm64
      - build-macos
      - build-macos-amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout A Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: 删除旧资产
        uses: andreaswilli/delete-release-assets-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.fetch_and_clean.outputs.tag }}
          deleteOnlyFromDrafts: false

      - name: 上传所有构建产物 (softprops/action-gh-release@v2)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.fetch_and_clean.outputs.tag }}
          files: |
            release-artifacts/linux-build/TomatoNovelDownloader-Linux_amd64-*
            release-artifacts/linux-musl-build/TomatoNovelDownloader-Linux_musl_amd64-*
            release-artifacts/linux-musl-arm64-build/TomatoNovelDownloader-Linux_musl_arm64-*
            release-artifacts/linux-arm64-build/TomatoNovelDownloader-Linux_arm64-*
            release-artifacts/android-arm64-build/TomatoNovelDownloader-Android_arm64-*
            release-artifacts/android-arm32-build/TomatoNovelDownloader-Android_arm32-*
            release-artifacts/windows-build/TomatoNovelDownloader-Win64-*.exe
            release-artifacts/windows-arm64-build/TomatoNovelDownloader-WinArm64-*.exe
            release-artifacts/macos-build/TomatoNovelDownloader-macOS_arm64-*
            release-artifacts/macos-amd64-build/TomatoNovelDownloader-macOS_amd64-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}